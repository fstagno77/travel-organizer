[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5107
  port = 8100
  publish = "dist"
  autoLaunch = false

[functions]
  node_bundler = "nft"

[functions."process-pdf"]
  timeout = 60

[functions."add-booking"]
  timeout = 60

[functions."process-email"]
  timeout = 60

[functions."pending-bookings"]
  timeout = 45

[functions."admin-api"]
  timeout = 30

[[edge_functions]]
  function = "og-share"
  path = "/share.html"

[[edge_functions]]
  function = "og-invite"
  path = "/login.html"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
